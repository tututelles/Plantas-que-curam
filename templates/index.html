<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Banco de Plantas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-seedling"></i> Banco de Plantas</h1>
            <p>Gerencie sua coleção de plantas com estilo ✨</p>
        </header>

        <!-- 🔍 BUSCA POR BOTÃO -->
        <div class="card">
            <h2><i class="fas fa-search"></i> Buscar Planta</h2>
            <div style="display: flex; gap: 15px; max-width: 600px; margin: 0 auto 20px;">
                <input type="text" id="searchInput" placeholder="Digite o nome da planta..." style="flex: 1;">
                <button id="btnBuscar" class="btn" style="width: auto; padding: 15px 25px;">
                    <i class="fas fa-search"></i> Buscar
                </button>
            </div>
            <div id="resultadoBusca" style="text-align: center; color: #666;"></div>
        </div>

        <!-- ➕ ADICIONAR PLANTA -->
        <div class="card">
            <h2><i class="fas fa-plus"></i> Adicionar Nova Planta</h2>
            <form id="formPlanta">
                <div class="form-group">
                    <label>Nome da Planta</label>
                    <input type="text" name="nome" required>
                </div>
                <div class="form-group">
                    <label>Nome Científico</label>
                    <input type="text" name="nome_cientifico" required>
                </div>
                <div class="form-group">
                    <label>Descrição</label>
                    <textarea name="descricao" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn">
                    <i class="fas fa-save"></i> Salvar Planta
                </button>
            </form>
        </div>

        <!-- 📋 BOTÕES DE NAVEGAÇÃO -->
        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <a href="/listar" class="btn" style="flex: 1; text-align: center; text-decoration: none;">
                <i class="fas fa-list"></i> Ver Todas as Plantas
            </a>
            <a href="/popular_exemplo" class="btn" style="flex: 1; text-align: center; text-decoration: none;" 
               onclick="popularExemplo(); return false;">
                <i class="fas fa-seedling"></i> Exemplos
            </a>
        </div>
    </div>

    <!-- MODAL RESULTADO BUSCA -->
    <div id="modalBusca" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        // 🔍 BUSCA APENAS NO BOTÃO
        document.getElementById('btnBuscar').addEventListener('click', function() {
            const nome = document.getElementById('searchInput').value.trim();
            
            if (nome.length < 2) {
                document.getElementById('resultadoBusca').innerHTML = 
                    '<p style="color: #f56565;">❌ Digite pelo menos 2 caracteres</p>';
                return;
            }

            // Loading
            document.getElementById('btnBuscar').innerHTML = 
                '<i class="fas fa-spinner fa-spin"></i> Buscando...';
            document.getElementById('resultadoBusca').innerHTML = 
                '<p><i class="fas fa-spinner fa-spin"></i> Procurando...</p>';

            fetch(`/buscar?nome=${encodeURIComponent(nome)}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('btnBuscar').innerHTML = 
                        '<i class="fas fa-search"></i> Buscar';
                    
                    if (data.encontrada) {
                        mostrarModal(data.planta);
                    } else {
                        document.getElementById('resultadoBusca').innerHTML = 
                            `<p style="color: #f56565;">❌ Planta "${nome}" não encontrada</p>`;
                    }
                })
                .catch(() => {
                    document.getElementById('btnBuscar').innerHTML = 
                        '<i class="fas fa-search"></i> Buscar';
                    document.getElementById('resultadoBusca').innerHTML = 
                        '<p style="color: #f56565;">❌ Erro na busca</p>';
                });
        });

        // ⏎ Enter também funciona
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('btnBuscar').click();
            }
        });

        // 📝 Formulário adicionar planta
        document.getElementById('formPlanta').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const btn = this.querySelector('button[type="submit"]');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;
            
            fetch('/adicionar', {
                method: 'POST',
                body: formData
            }).then(res => res.json())
              .then(data => {
                  btn.innerHTML = '<i class="fas fa-save"></i> Salvar Planta';
                  btn.disabled = false;
                  
                  if (data.sucesso) {
                      alert('✅ ' + data.mensagem);
                      this.reset();
                  } else {
                      alert('❌ Erro: ' + data.erro);
                  }
              });
        });

        // 🌱 Popular exemplos
        function popularExemplo() {
            if (confirm('Adicionar 3 plantas de exemplo?')) {
                window.location.href = '/popular_exemplo';
            }
        }

        // Modal functions
        function mostrarModal(planta) {
            const modal = document.getElementById('modalBusca');
            const modalBody = document.getElementById('modalBody');
            
            modalBody.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <h2 style="color: #2d3748; margin-bottom: 10px;">${planta.nome}</h2>
                    <p style="color: #667eea; font-size: 1.1rem; font-style: italic;">
                        ${planta.nome_cientifico}
                    </p>
                </div>
                <div style="line-height: 1.6; color: #4a5568; margin-bottom: 20px;">
                    ${planta.descricao}
                </div>
                ${planta.imagem_b64 ? 
                    `<img src="data:image/jpeg;base64,${planta.imagem_b64}" 
                          style="max-width:100%; height: 300px; object-fit: cover; border-radius:15px;">` : 
                    '<div style="text-align: center; color: #a0aec0; font-size: 1.2rem; padding: 40px;">
                        <i class="fas fa-image" style="font-size: 3rem; margin-bottom: 10px;"></i>
                        <p>Sem imagem</p>
                     </div>'
                }
                <div style="margin-top: 20px;">
                    <a href="/imagem/${planta.id}" class="btn" style="width: 100%; margin-top: 10px;" download>
                        <i class="fas fa-download"></i> Baixar Imagem
                    </a>
                </div>
            `;
            modal.style.display = 'block';
            document.getElementById('resultadoBusca').innerHTML = 
                <p style="color: #48bb78;">✅ Planta "${planta.nome}" encontrada! Veja no modal.</p>`;
        }

        // Fechar modal
        document.querySelector('.close').onclick = function() {
            document.getElementById('modalBusca').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modalBusca');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
